<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reto Matemático: Tema 9</title>
    <style>
        :root {
            --bg: #f0f4f8; --card: #ffffff; --primary: #4a90e2;
            --angles: #ff7675; --move: #55efc4; --calc: #a29bfe;
            --text: #2d3436; --success: #00b894;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { margin: 0; font-size: 2rem; color: var(--primary); }

        /* Contenedor de Retos (Grid para Tablet) */
        .challenge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .challenge-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border-top: 8px solid var(--primary);
        }

        .card-angles { border-color: var(--angles); }
        .card-move { border-color: var(--move); }
        .card-calc { border-color: var(--calc); }

        .card-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        /* Lista de preguntas dentro de la card */
        .question-list { flex-grow: 1; overflow-y: auto; max-height: 400px; padding-right: 5px; }

        .q-item {
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .q-text { font-weight: 600; margin-bottom: 10px; display: block; font-size: 1rem; }

        .options-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button {
            padding: 10px; border: 2px solid #ddd; border-radius: 8px;
            background: white; cursor: pointer; font-size: 0.9rem;
            transition: all 0.2s;
        }

        button.correct { background: var(--success); color: white; border-color: var(--success); }
        button.wrong { background: #ff7675; color: white; border-color: #ff7675; }

        /* Barra de progreso por reto */
        .mini-progress {
            height: 8px; background: #eee; border-radius: 4px; 
            margin: 15px 0; overflow: hidden;
        }
        .fill { height: 100%; width: 0%; transition: width 0.5s; background: var(--success); }

        .stats { font-size: 0.8rem; color: #636e72; text-align: right; }

        @media (max-width: 600px) {
            .options-box { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚀 Misión: Tema 9</h1>
    <p>Completa todos los retos para convertirte en experto.</p>
</div>

<div class="challenge-grid">
    <div class="challenge-card card-angles">
        <div class="card-title">📐 El Mundo de los Ángulos</div>
        <div class="mini-progress"><div id="fill-angles" class="fill"></div></div>
        <div class="stats"><span id="score-angles">0</span> / 20</div>
        <div class="question-list" id="list-angles"></div>
    </div>

    <div class="challenge-card card-move">
        <div class="card-title">🗺️ Mapa y Simetría</div>
        <div class="mini-progress"><div id="fill-move" class="fill"></div></div>
        <div class="stats"><span id="score-move">0</span> / 15</div>
        <div class="question-list" id="list-move"></div>
    </div>

    <div class="challenge-card card-calc">
        <div class="card-title">🧠 Super Cerebro</div>
        <div class="mini-progress"><div id="fill-calc" class="fill"></div></div>
        <div class="stats"><span id="score-calc">0</span> / 15</div>
        <div class="question-list" id="list-calc"></div>
    </div>
</div>

<script>
    const data = {
        angles: [
            { q: "¿Cómo se llama el punto donde se cortan los lados?", a: ["Vértice", "Centro"], c: 0 },
            { q: "Un ángulo de 90° es...", a: ["Recto", "Agudo"], c: 0 },
            { q: "Si mide menos de 90° es...", a: ["Obtuso", "Agudo"], c: 1 },
            { q: "Si mide más de 90° (pero menos de 180°) es...", a: ["Obtuso", "Llano"], c: 0 },
            { q: "El ángulo de 180° se llama...", a: ["Recto", "Llano"], c: 1 },
            { q: "¿Qué usamos para medir ángulos?", a: ["Regla", "Transportador"], c: 1 },
            { q: "Los lados de un ángulo son dos...", a: ["Rectas", "Semirrectas"], c: 1 },
            { q: "Dos ángulos rectos juntos forman uno...", a: ["Llano", "Completo"], c: 0 },
            { q: "Ángulos opuestos por el vértice son...", a: ["Iguales", "Diferentes"], c: 0 },
            { q: "¿Cuánto mide el ángulo complementario de 30°?", a: ["60°", "150°"], c: 0 },
            { q: "Las agujas a las 3:00 forman un ángulo...", a: ["Agudo", "Recto"], c: 1 },
            { q: "Si un ángulo mide 10°, es...", a: ["Agudo", "Obtuso"], c: 0 },
            { q: "Dos rectas que nunca se cortan son...", a: ["Paralelas", "Secantes"], c: 0 },
            { q: "Rectas que forman 4 ángulos rectos son...", a: ["Paralelas", "Perpendiculares"], c: 1 },
            { q: "Un ángulo de 120° es...", a: ["Obtuso", "Agudo"], c: 0 },
            { q: "La unidad de los ángulos es el...", a: ["Grado", "Metro"], c: 0 },
            { q: "A las 6:00 las agujas forman un ángulo...", a: ["Llano", "Recto"], c: 0 },
            { q: "¿Cuántos vértices tiene un ángulo?", a: ["1", "2"], c: 0 },
            { q: "Si un ángulo mide 91°, es...", a: ["Recto", "Obtuso"], c: 1 },
            { q: "La abertura de un ángulo es su...", a: ["Amplitud", "Largo"], c: 0 }
        ],
        move: [
            { q: "La línea que divide una figura en dos iguales es el...", a: ["Eje", "Borde"], c: 0 },
            { q: "Un cuadrado tiene...", a: ["4 ejes", "2 ejes"], c: 0 },
            { q: "La letra 'A' tiene simetría...", a: ["Vertical", "Horizontal"], c: 0 },
            { q: "En (3, 5), el 3 indica pasos a la...", a: ["Derecha", "Arriba"], c: 0 },
            { q: "En (3, 5), el 5 indica pasos hacia...", a: ["Derecha", "Arriba"], c: 1 },
            { q: "El punto (0,0) es el...", a: ["Origen", "Final"], c: 0 },
            { q: "Mover una figura sin girarla es...", a: ["Traslación", "Simetría"], c: 0 },
            { q: "Un espejo crea imágenes...", a: ["Simétricas", "Iguales"], c: 0 },
            { q: "¿Tiene el círculo ejes de simetría?", a: ["Infinitos", "Solo 1"], c: 0 },
            { q: "La letra 'H' tiene...", a: ["2 ejes", "0 ejes"], c: 0 },
            { q: "Si voy de (1,1) a (4,1) me muevo a la...", a: ["Derecha", "Arriba"], c: 0 },
            { q: "Un triángulo equilátero tiene...", a: ["3 ejes", "1 eje"], c: 0 },
            { q: "Tu reflejo en el agua es...", a: ["Simetría", "Traslación"], c: 0 },
            { q: "Coordenadas: (X, Y). ¿Cuál va primero?", a: ["X (Horizontal)", "Y (Vertical)"], c: 0 },
            { q: "Una jarra con un asa es...", a: ["Asimétrica", "Simétrica"], c: 0 }
        ],
        calc: [
            { q: "45 + 9 =", a: ["54", "55"], c: 0 },
            { q: "12 + 9 =", a: ["21", "22"], c: 0 },
            { q: "36 + 9 =", a: ["45", "46"], c: 0 },
            { q: "100 + 99 =", a: ["199", "189"], c: 0 },
            { q: "Doble de 15:", a: ["30", "25"], c: 0 },
            { q: "85 + 9 =", a: ["94", "93"], c: 0 },
            { q: "Doble de 40:", a: ["80", "70"], c: 0 },
            { q: "9 + 9 + 9 =", a: ["27", "28"], c: 0 },
            { q: "75 + 25 =", a: ["100", "90"], c: 0 },
            { q: "Mitad de 60:", a: ["30", "40"], c: 0 },
            { q: "200 + 99 =", a: ["299", "289"], c: 0 },
            { q: "Doble de 12:", a: ["24", "22"], c: 0 },
            { q: "50 - 9 =", a: ["41", "39"], c: 0 },
            { q: "10 + 10 + 9 =", a: ["29", "30"], c: 0 },
            { q: "Mitad de 100:", a: ["50", "25"], c: 0 }
        ]
    };

    const scores = { angles: 0, move: 0, calc: 0 };

    function render(category) {
        const container = document.getElementById(`list-${category}`);
        data[category].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'q-item';
            div.innerHTML = `
                <span class="q-text">${item.q}</span>
                <div class="options-box">
                    ${item.a.map((opt, i) => `<button onclick="check(this, '${category}', ${index}, ${i})">${opt}</button>`).join('')}
                </div>
            `;
            container.appendChild(div);
        });
    }

    window.check = function(btn, cat, qIdx, ansIdx) {
        const item = data[cat][qIdx];
        const buttons = btn.parentElement.querySelectorAll('button');
        
        if (btn.disabled) return;

        if (ansIdx === item.c) {
            btn.classList.add('correct');
            scores[cat]++;
        } else {
            btn.classList.add('wrong');
            buttons[item.c].classList.add('correct');
        }

        buttons.forEach(b => b.disabled = true);
        updateProgress(cat);
    }

    function updateProgress(cat) {
        const total = data[cat].length;
        const percent = (scores[cat] / total) * 100;
        document.getElementById(`fill-${cat}`).style.width = percent + "%";
        document.getElementById(`score-${cat}`).innerText = scores[cat];
    }

    render('angles');
    render('move');
    render('calc');
</script>
</body>
</html>
